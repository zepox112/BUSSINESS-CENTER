<!DOCTYPE html>
<html lang="sw">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IAA Market | Airaza graphic solution</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Orbitron:wght@500&display=swap"
        rel="stylesheet">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#061a3d">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="logo.jpg">
    <link rel="icon" type="image/jpeg" href="logo.jpg">
    <link rel="apple-touch-icon" href="logo.jpg">

    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.15);
            --dark-blue: #0a192f;
            --accent-blue: #00d2ff;
            --pink: #ff85a2;
            --blue-tick: #0095f6;
            --hot: #ff4757;
            --white: #ffffff;
            --whatsapp: #25d366;
        }

        * {
            box-sizing: border-box;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle at top right, #1a2a6c, #0a192f, #000000);
            background-attachment: fixed;
            color: var(--white);
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        header {
            padding: 25px 15px;
            text-align: center;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            background: rgba(10, 25, 47, 0.8);
            border-bottom: 1px solid var(--glass-border);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo-container {
            margin-bottom: 10px;
            display: flex;
            justify-content: center;
        }

        .main-logo {
            width: 75px;
            height: 75px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--white);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
        }

        .btn-register-top {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--glass-border);
            color: var(--white);
            padding: 10px 24px;
            border-radius: 50px;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 700;
            margin-top: 15px;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-register-top:hover {
            background: var(--white);
            color: var(--dark-blue);
            transform: translateY(-3px) scale(1.05);
        }

        .market-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            padding: 20px;
            max-width: 1200px;
            margin: auto;
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            padding: 20px;
            border-radius: 24px;
            position: relative;
            cursor: pointer;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        /* Profile DP in Card */
        .biz-profile-container {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
        }

        .biz-dp {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--accent-blue);
            background: rgba(255, 255, 255, 0.1);
        }

        .card::before {
            content: "";
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.05), transparent);
            transition: 0.5s;
        }

        .card:hover::before {
            left: 100%;
        }

        .card:hover {
            transform: translateY(-10px);
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--white);
        }

        .badge-container {
            display: flex;
            gap: 5px;
            position: absolute;
            top: 15px;
            right: 15px;
        }

        .hot-badge {
            background: var(--hot);
            color: white;
            padding: 3px 8px;
            border-radius: 10px;
            font-size: 9px;
            font-weight: bold;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.1);
            }

            100% {
                transform: scale(1);
            }
        }

        .blue-tick {
            color: var(--blue-tick);
            font-size: 0.9em;
            margin-left: 6px;
        }

        .biz-name {
            font-size: 1.15rem;
            display: flex;
            align-items: center;
            font-weight: 700;
            margin: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 25, 47, 0.9);
            backdrop-filter: blur(20px);
            z-index: 2000;
            overflow-y: auto;
        }

        .modal-content {
            background: var(--dark-blue);
            color: var(--white);
            width: 92%;
            max-width: 480px;
            margin: 40px auto;
            border-radius: 30px;
            padding: 25px;
            position: relative;
            border: 1px solid var(--glass-border);
            animation: zoomIn 0.3s ease-out;
        }

        @keyframes zoomIn {
            from {
                transform: scale(0.9);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .whatsapp-bar {
            background: var(--whatsapp);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 15px;
            border-radius: 18px;
            text-decoration: none;
            font-weight: bold;
            margin: 15px 0 20px 0;
            font-size: 15px;
        }

        .product-item {
            display: flex;
            background: rgba(255, 255, 255, 0.03);
            margin-bottom: 12px;
            padding: 12px;
            border-radius: 15px;
            align-items: center;
            border: 1px solid var(--glass-border);
        }

        .product-img {
            width: 65px;
            height: 65px;
            border-radius: 12px;
            object-fit: cover;
            margin-right: 15px;
            background: #ddd;
        }

        @media (max-width: 600px) {
            .market-grid {
                grid-template-columns: 1fr;
                padding: 15px;
            }

            header h1 {
                font-size: 1.25rem;
            }

            .modal-content {
                margin: 20px auto;
                width: 95%;
            }
        }
    </style>
</head>

<body>

    <header>
        <div class="logo-container">
            <img src="logo.jpg" alt="Logo" class="main-logo"
                onerror="this.src='https://via.placeholder.com/80/0a192f/ffffff?text=IAA'">
        </div>
        <h1>🛒 IAA MARKET PLACE</h1>
        <p style="font-size: 0.8rem; opacity: 0.8;">KUZA BIASHARA YAKO SASA</p>

        <a href="https://zepox112.github.io/BUSSINESS-CENTER/Business.html" class="btn-register-top">
            <i class="fas fa-plus-circle"></i> SAJILI BIASHARA
        </a>
    </header>

    <div class="market-grid" id="market"></div>

    <div id="productModal" class="modal">
        <div class="modal-content">
            <span onclick="closeModal()"
                style="float:right; cursor:pointer; font-size:26px; color: #999; padding: 5px;">&times;</span>

            <div class="biz-profile-container">
                <img id="modalBizDP" src="" class="biz-dp" onerror="this.src='https://via.placeholder.com/50?text=B'">
                <h2 id="modalBizName" style="color: var(--white); display:flex; align-items:center; font-size: 1.4rem;">
                </h2>
            </div>

            <a href="#" id="whatsappBtn" class="whatsapp-bar" target="_blank">
                <i class="fab fa-whatsapp" style="font-size: 1.6rem;"></i>
                WASILIANA KWA WHATSAPP
            </a>

            <p id="modalBizDesc"
                style="color: #ccd6f6; font-size: 14px; border-left: 4px solid var(--white); padding-left:12px; margin-bottom: 20px; line-height: 1.5;">
            </p>

            <hr style="border: 0; border-top: 1px solid var(--glass-border); margin: 15px 0;">
            <h4 style="margin: 0 0 15px 0; font-size: 1rem; color: var(--accent-blue);"><i class="fas fa-box-open"></i>
                ORODHA YA BIDHAA</h4>
            <div id="productList"></div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxIkaI-7T6Iha43wAOkkQgffvc9-YU3ZDc9DGGzDTqCZ7XOgbaTsnqsD_EXp38dSfyuWg/exec";

        function loadFromCache() {
            try {
                const cachedData = localStorage.getItem('marketData');
                if (cachedData) {
                    const parsed = JSON.parse(cachedData);
                    if (Array.isArray(parsed)) renderMarket(parsed);
                }
            } catch (e) { localStorage.removeItem('marketData'); }
        }

        function renderMarket(data) {
            const market = document.getElementById('market');
            if (!market) return;

            // Panga data (Verified kwanza, halafu Views)
            const sortedData = [...data].sort((a, b) => {
                const aVerified = (a.status || "").toLowerCase().trim() === 'verified';
                const bVerified = (b.status || "").toLowerCase().trim() === 'verified';
                if (aVerified && !bVerified) return -1;
                if (!aVerified && bVerified) return 1;
                return b.visits - a.visits;
            });

            // Tumia mbinu ya kulinganisha ili kuzuia kadi kuruka wakati wa kurefresh
            const html = sortedData.map((b) => {
                const isHot = b.visits > 50;
                const isVerified = (b.status || "").toLowerCase().trim() === 'verified';
                const profileImg = b.profileUrl || "https://via.placeholder.com/50?text=B";

                return `
                <div class="card" onclick='openDetails(${JSON.stringify(b).replace(/'/g, "&apos;")})'>
                    <div class="badge-container">${isHot ? '<span class="hot-badge">HOT 🔥</span>' : ''}</div>
                    <div class="biz-profile-container">
                        <img src="${profileImg}" class="biz-dp" loading="lazy" onerror="this.src='https://via.placeholder.com/50?text=B'">
                        <h3 class="biz-name">
                            ${b.name} ${isVerified ? '<i class="fas fa-check-circle blue-tick"></i>' : ''}
                        </h3>
                    </div>
                    <p style="font-size: 13px; color: #8892b0; margin: 5px 0; line-height: 1.4;">${b.description ? b.description.substring(0, 70) : ''}...</p>
                    <div style="font-size:11px; color: var(--accent-blue); font-weight: 500;">
                        <i class="fas fa-eye"></i> ${b.visits || 0} views
                    </div>
                </div>`;
            }).join('');

            // Update kimya kimya kama kuna mabadiliko
            if (market.innerHTML !== html) {
                market.innerHTML = html;
            }
        }

        async function fetchMarketData() {
            try {
                const response = await fetch(SCRIPT_URL + "?action=read");
                const data = await response.json();
                if (Array.isArray(data)) {
                    localStorage.setItem('marketData', JSON.stringify(data));
                    renderMarket(data);
                }
            } catch (e) { console.error("Refresh Silent Error"); }
        }

        async function openDetails(biz) {
            const modal = document.getElementById('productModal');
            const isVerified = (biz.status || "").toLowerCase().trim() === 'verified';

            document.getElementById('modalBizName').innerHTML = `${biz.name} ${isVerified ? '<i class="fas fa-check-circle blue-tick"></i>' : ''}`;
            document.getElementById('modalBizDesc').innerText = biz.description;
            document.getElementById('modalBizDP').src = biz.profileUrl || "https://via.placeholder.com/50?text=B";

            const waBtn = document.getElementById('whatsappBtn');
            let cleanPhone = biz.phone ? biz.phone.toString().replace(/\D/g, '') : '';
            if (cleanPhone.startsWith('0')) cleanPhone = '255' + cleanPhone.substring(1);
            else if (cleanPhone.startsWith('7') || cleanPhone.startsWith('6')) cleanPhone = '255' + cleanPhone;
            waBtn.href = `https://wa.me/${cleanPhone}?text=Habari ${biz.name}, nimeona biashara yako kwenye IAA Marketplace. Nahitaji huduma yako.`;

            const list = document.getElementById('productList');
            list.innerHTML = "<p style='text-align:center; padding: 20px; font-size: 14px; opacity: 0.5;'>Inapakia bidhaa...</p>";
            modal.style.display = 'block';

            let viewedItems = JSON.parse(localStorage.getItem('viewedBiz') || "[]");
            if (!viewedItems.includes(biz.id)) {
                fetch(SCRIPT_URL + `?action=addView&id=${biz.id}`);
                viewedItems.push(biz.id);
                localStorage.setItem('viewedBiz', JSON.stringify(viewedItems));
            }

            try {
                const res = await fetch(SCRIPT_URL + `?action=readProducts&bizId=${biz.id}`);
                const products = await res.json();
                list.innerHTML = products.map(p => `
                <div class="product-item">
                    <img src="${p.image || 'https://via.placeholder.com/70'}" class="product-img" loading="lazy">
                    <div style="flex-grow:1">
                        <strong style="display:block; font-size: 14px; color: var(--white);">${p.productName}</strong>
                        <span style="color: var(--accent-blue); font-weight:700; font-size: 13px; display:block; margin: 3px 0;">TSH ${Number(p.price).toLocaleString()}</span>
                        <p style="font-size:11px; color:#8892b0; line-height: 1.4;">${p.description || ''}</p>
                    </div>
                </div>
            `).join('') || "<p style='text-align:center; padding: 20px; color: #64748b;'>Hajapandisha bidhaa bado.</p>";
            } catch (e) { list.innerHTML = "<p style='text-align:center; color: #ff4757;'>Mtandao unazingua.</p>"; }
        }

        function closeModal() { document.getElementById('productModal').style.display = 'none'; }
        window.onclick = (e) => { if (e.target.className === 'modal') closeModal(); }

        loadFromCache();
        fetchMarketData();
        setInterval(fetchMarketData, 5000); // REFRESH YA UAKIKA KILA SEKUNDE 5
    </script>
</body>

</html>
